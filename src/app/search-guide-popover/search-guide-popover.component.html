<ion-popover
  [isOpen]="reference.isSearchGuidePopoverOpen"
  (didDismiss)="reference.isSearchGuidePopoverOpen = false"
  class="floating-popover">
  <ng-template>
    <div class="popover-island">
      <div class="button-grid">
        <button class="nav-item-btn" 
          [class.red-pill]="reference.foundPlace"
          (click)="reference.foundPlace ? clearSearchPlace() : openPlaceSearch()">
          <ion-icon [name]="reference.foundPlace ? 'trash-sharp' : 'location-sharp'" [class.primary-icon]="!reference.foundPlace"></ion-icon>
          <p>{{ 'SEARCH.LOCATION' | translate }}</p>
        </button>

        <button class="nav-item-btn" 
          [class.red-pill]="reference.foundRoute"
          (click)="reference.foundRoute ? clearSearchRoute() : openRouteSearch()">
          <ion-icon [name]="reference.foundRoute ? 'trash-sharp' : 'walk-sharp'" [class.primary-icon]="!reference.foundRoute"></ion-icon>
          <p>{{ 'SEARCH.ROUTE' | translate }}</p>
        </button>
      </div>
    </div>
  </ng-template>
</ion-popover>


<ion-popover
  [isOpen]="reference.isSearchPopoverOpen"
  (didDismiss)="reference.isSearchPopoverOpen = false"
  class="floating-popover top-search-popover">
  <ng-template>
    <div class="popover-island glass-form">
      
      <div class="search-input-wrapper">
        <ion-icon name="search-sharp" class="inner-icon"></ion-icon>
        
        <ion-input 
          [(ngModel)]="query" 
          (ionInput)="onSearchInput($event.detail.value)" 
          (keyup.enter)="openList()" 
          [placeholder]="'SEARCH.SEARCH' | translate">
        </ion-input>
        
        <div class="input-actions-row">
          @if (query) {
            <ion-icon name="close-circle" class="clear-icon" (click)="query = ''; results = []"></ion-icon>
          }
          <ion-icon 
            [name]="(activeTarget === 'query' && isListening) ? 'mic-sharp' : 'mic-outline'" 
            [class.mic-active]="activeTarget === 'query' && isListening"
            class="mic-icon" 
            (click)="startDictation('query')">
          </ion-icon>
        </div>
      </div>

      <button class="main-action-btn" (click)="openList()" [disabled]="loading">
        @if (loading) {
          <ion-spinner name="crescent"></ion-spinner>
        } @else {
          @if (results.length === 0) { <span>{{ 'SEARCH.FIND_PLACES' | translate }}</span> }
          @if (results.length > 0) { <span>{{ 'SEARCH.SELECT_PLACE' | translate }}</span> }
        }
      </button>

      @if (results.length > 0) {
        <div class="results-container">
          <ion-list lines="none">
            @for (result of results; track $index) {
              <ion-item (click)="handleLocationSelection(result)" button detail="false">
                <ion-label><h2>{{ result.short_name || result.name }}</h2></ion-label>
              </ion-item>
            }
          </ion-list>
        </div>
      }
    </div>
  </ng-template>
</ion-popover>


<ion-popover
  [isOpen]="reference.isGuidePopoverOpen"
  (didDismiss)="reference.isGuidePopoverOpen = false"
  class="floating-popover top-search-popover">
  <ng-template>
    <div class="popover-island glass-form">
      
      <div class="input-stack" [class.confirmed]="originCoords">
        
        <ion-input 
          [(ngModel)]="query2" 
          [placeholder]="'SEARCH.FROM' | translate" 
          (ionFocus)="activeRouteField = 'origin'"
          (ionInput)="onSearchInput($event.detail.value)">
        </ion-input>
        
        <div class="input-actions-row">
          <ion-icon 
            [name]="(activeTarget === 'query2' && isListening) ? 'mic-sharp' : 'mic-outline'" 
            [class.mic-active]="activeTarget === 'query2' && isListening"
            class="mic-icon" 
            (click)="startDictation('query2')">
          </ion-icon>
          <ion-icon name="locate-sharp" (click)="useCurrentLocation('origin')" class="action-icon"></ion-icon>
        </div>
      </div>

      <div class="input-stack" [class.confirmed]="destinationCoords">
        
        <ion-input 
          [(ngModel)]="query3" 
          [placeholder]="'SEARCH.TO' | translate" 
          (ionFocus)="activeRouteField = 'destination'"
          (ionInput)="onSearchInput($event.detail.value)">
        </ion-input>
        
        <div class="input-actions-row">
          <ion-icon 
            [name]="(activeTarget === 'query3' && isListening) ? 'mic-sharp' : 'mic-outline'" 
            [class.mic-active]="activeTarget === 'query3' && isListening"
            class="mic-icon" 
            (click)="startDictation('query3')">
          </ion-icon>
          <ion-icon name="locate-sharp" (click)="useCurrentLocation('destination')" class="action-icon"></ion-icon>
        </div>
      </div>
      
      <div class="transport-selection">
        @for (mode of transportMeans; track mode.id) {
          <div class="mode-chip" [class.active]="selectedTransport === mode.id" (click)="selectedTransport = mode.id">
            <ion-icon [name]="mode.icon"></ion-icon>
          </div>
        }
      </div>

      <button class="main-action-btn" (click)="onRouteButtonClick()" [disabled]="loading">
        @if (loading) {
          <ion-spinner name="crescent"></ion-spinner>
        } @else {
          @if (originCoords && destinationCoords) { 
            <span>{{ 'SEARCH.GET_ROUTE' | translate }}</span> 
          } @else if (results.length === 0) { 
            <span>{{ 'SEARCH.FIND_PLACES' | translate }}</span> 
          } @else { 
            <span>{{ 'SEARCH.SELECT_PLACE' | translate }}</span> 
          }
        }
      </button>

      @if (results.length > 0) {
        <div class="results-container">
           <ion-list lines="none">
            @for (result of results; track $index) {
              <ion-item (click)="selectRoutePoint(result)" button detail="false">
                <ion-label><h2>{{ result.short_name || result.name }}</h2></ion-label>
              </ion-item>
            }
          </ion-list>
        </div>
      }
    </div>
  </ng-template>
</ion-popover>
